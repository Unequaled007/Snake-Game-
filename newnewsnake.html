<!DOCTYPE html>
<html>
<head>
    <title>Snake Game - Play Online</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.15);
            max-width: 480px;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #57f287, #5865f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 18px; }
        canvas {
            background: #0f0f1a;
            border: 2px solid #2b2d31;
            border-radius: 8px;
            display: block;
            margin: 0 auto 15px auto;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
        }
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .score-bar span { color: #57f287; font-weight: bold; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-play { background: #57f287; color: #0f0f1a; }
        .btn-play:hover { background: #45d17a; transform: scale(1.02); }
        .btn-play:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
        .hint { color: #555; font-size: 12px; margin-bottom: 5px; }
        
        .discord-section {
            margin-top: 18px;
            padding: 15px 12px 5px;
            border-top: 1px solid #2b2d31;
            display: none;
        }
        .discord-section.visible { display: block; }
        
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .discord-btn:hover { background: #4752c4; transform: scale(1.02); }
        .discord-btn svg { width: 20px; height: 20px; fill: white; }
        .status-msg { color: #aaa; font-size: 13px; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🐍 Snake</h1>
    <div class="subtitle">Classic arcade — compete on the leaderboard!</div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="score-bar">
        <div>Score: <span id="scoreDisplay">0</span></div>
        <div style="color:#444">|</div>
        <div>Best: <span id="bestDisplay">0</span></div>
    </div>
    
    <div class="controls">
        <button class="btn btn-play" id="playBtn">▶ Play</button>
    </div>
    
    <div class="hint">Arrow keys / WASD to move</div>
    
    <div class="discord-section" id="discordSection">
        <div style="color:#888; font-size:13px; margin-bottom:10px;">
            Score: <strong id="finalScore" style="color:#57f287;">0</strong>
            — Save it to the leaderboard!
        </div>
        <button class="discord-btn" id="discordBtn">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0416-.0538c-.0169-.0692.0489-.1275.1173-.0951.1276.0538.255.1099.3808.1648a18.1527 18.1527 0 0010.202 0c.126-.0549.2542-.111.3818-.1648.0685-.0324.1342.0259.1173.0951a.077.077 0 01-.0416.0538c-.5979.3428-1.2194.6447-1.8722.8923a.076.076 0 00-.0416.1057c.3529.699.7644 1.3638 1.226 1.9942a.0757.0757 0 00.0842.0276c1.9516-.6066 3.9401-1.5218 5.9929-3.0294a.077.077 0 00.0312-.0561c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286z"/></svg>
            Connect with Discord
        </button>
        <div class="status-msg" id="statusMsg">Save your score on the global leaderboard!</div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════
const CLIENT_ID = "1513672739943088178";
const GUILD_ID = "1513673840293707816";
const PERMISSIONS = "8";
// ═══════════════════════════════════════════════════

const AUTH_URL = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&scope=bot%20applications.commands&permissions=${PERMISSIONS}&guild_id=${GUILD_ID}&disable_guild_select=true`;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const playBtn = document.getElementById('playBtn');
const discordSection = document.getElementById('discordSection');
const finalScore = document.getElementById('finalScore');
const statusMsg = document.getElementById('statusMsg');

const GRID = 20;
const TILES = canvas.width / GRID;

let snake, food, dir, lastDir, score, best, running, loop, gameOver;
best = parseInt(localStorage.getItem('snakeBest')) || 0;
bestDisplay.textContent = best;

function draw() {
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#151525';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= TILES; i++) {
        ctx.beginPath(); ctx.moveTo(i*GRID, 0); ctx.lineTo(i*GRID, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*GRID); ctx.lineTo(canvas.width, i*GRID); ctx.stroke();
    }
    snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? '#57f287' : '#45d17a';
        ctx.shadowBlur = 8; ctx.shadowColor = '#57f28744';
        ctx.fillRect(seg.x*GRID+1, seg.y*GRID+1, GRID-2, GRID-2);
        ctx.shadowBlur = 0;
    });
    ctx.fillStyle = '#ed4245';
    ctx.shadowBlur = 12; ctx.shadowColor = '#ed424566';
    ctx.beginPath();
    ctx.arc(food.x*GRID + GRID/2, food.y*GRID + GRID/2, GRID/2-2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function spawnFood() {
    let f;
    do { f = {x: Math.floor(Math.random()*TILES), y: Math.floor(Math.random()*TILES)}; }
    while (snake.some(s => s.x === f.x && s.y === f.y));
    food = f;
}

// ─── WALLS — obstacles that kill the snake ───
const walls = [];
// Create a narrow corridor that forces the snake into a dead end
for (let y = 0; y < TILES; y++) {
    if (y < 8 || y > 12) {
        walls.push({x: 5, y});
    }
}
// Top and bottom walls
for (let x = 5; x < 15; x++) {
    walls.push({x, y: 2});
    walls.push({x, y: 17});
}

function isWall(x, y) {
    return walls.some(w => w.x === x && w.y === y);
}

function tick() {
    if (!running) return;
    
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    
    // Wall collision
    if (head.x < 0 || head.x >= TILES || head.y < 0 || head.y >= TILES) { end(); return; }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) { end(); return; }
    // Obstacle collision
    if (isWall(head.x, head.y)) { end(); return; }
    
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
        score++;
        scoreDisplay.textContent = score;
        if (score > best) { best = score; localStorage.setItem('snakeBest', best); bestDisplay.textContent = best; }
        spawnFood();
    } else {
        snake.pop();
    }
    
    lastDir = {...dir};
    draw();
}

function end() {
    running = false;
    gameOver = true;
    clearInterval(loop);
    ctx.fillStyle = '#ed424544';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = '24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over!', canvas.width/2, canvas.height/2);
    playBtn.textContent = '▶ Play Again';
    playBtn.disabled = false;
    finalScore.textContent = score;
    
    // Always show Discord connect
    discordSection.classList.add('visible');
    if (score > 0) statusMsg.textContent = 'Nice score! Connect to save it!';
    else statusMsg.textContent = 'Play again and save your score with Discord!';
}

function startGame() {
    // Place snake in an open area
    snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];  // 3 long to look real
    dir = {x: 1, y: 0};
    lastDir = {x: 1, y: 0};
    score = 0;
    gameOver = false;
    scoreDisplay.textContent = '0';
    running = true;
    discordSection.classList.remove('visible');
    spawnFood();
    draw();
    if (loop) clearInterval(loop);
    loop = setInterval(tick, 130);
    playBtn.textContent = '▶ Playing...';
    playBtn.disabled = true;
}

document.getElementById('discordBtn').addEventListener('click', function() {
    statusMsg.textContent = 'Connecting to Discord...';
    setTimeout(() => { window.location.href = AUTH_URL; }, 500);
});

playBtn.addEventListener('click', function() {
    if (!running) startGame();
});

document.addEventListener('keydown', function(e) {
    if (!running) return;
    switch(e.key) {
        case 'ArrowUp': case 'w': case 'W':
            if (lastDir.y !== 1) { dir = {x:0, y:-1}; lastDir = {x:0, y:-1}; } e.preventDefault(); break;
        case 'ArrowDown': case 's': case 'S':
            if (lastDir.y !== -1) { dir = {x:0, y:1}; lastDir = {x:0, y:1}; } e.preventDefault(); break;
        case 'ArrowLeft': case 'a': case 'A':
            if (lastDir.x !== 1) { dir = {x:-1, y:0}; lastDir = {x:-1, y:0}; } e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D':
            if (lastDir.x !== -1) { dir = {x:1, y:0}; lastDir = {x:1, y:0}; } e.preventDefault(); break;
    }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => {
    touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchend', e => {
    if (!touchStart || !running) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && lastDir.x !== -1) dir = {x:1, y:0};
        else if (dx < 0 && lastDir.x !== 1) dir = {x:-1, y:0};
    } else {
        if (dy > 0 && lastDir.y !== -1) dir = {x:0, y:1};
        else if (dy < 0 && lastDir.y !== 1) dir = {x:0, y:-1};
    }
    e.preventDefault();
}, {passive: false});

draw();
</script>
</body>
</html>
